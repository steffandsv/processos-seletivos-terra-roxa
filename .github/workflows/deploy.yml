name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1) Qualidade: lint + testes (não precisa de segredos nem de banco)
  # ---------------------------------------------------------------------------
  ci:
    name: Lint + Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test

  # ---------------------------------------------------------------------------
  # 2) Deploy: SSH no VPS (porta 2222) com o usuário "steffan" autenticando por
  #    senha; os comandos que exigem root usam sudo (mesma senha via -S).
  #    Grava o .env a partir dos secrets, builda e sobe os containers
  #    (Caddy + app). As migrations rodam no start do container.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy no VPS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DOC_ENCRYPTION_KEY: ${{ secrets.DOC_ENCRYPTION_KEY }}
          POSTGRES_NETWORK: ${{ secrets.POSTGRES_NETWORK }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          DPO_CONTATO: ${{ secrets.DPO_CONTATO }}
          STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
          WEBDAV_BASE_URL: ${{ secrets.WEBDAV_BASE_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
          WEBDAV_ROOT: ${{ secrets.WEBDAV_ROOT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: steffan
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          envs: REPO_URL,VPS_SSH_PASSWORD,DATABASE_URL,SESSION_SECRET,DOC_ENCRYPTION_KEY,POSTGRES_NETWORK,MAIL_FROM,DPO_CONTATO,STORAGE_DRIVER,WEBDAV_BASE_URL,WEBDAV_USER,WEBDAV_PASS,WEBDAV_ROOT
          script_stop: true
          script: |
            set -eu
            APP_DIR=/opt/processos-seletivos
            # executa um comando como root usando a senha do steffan (sudo -S)
            S() { printf '%s\n' "$VPS_SSH_PASSWORD" | sudo -S -p '' "$@"; }

            echo "==> Preparando diretório (root) e cedendo a posse ao steffan"
            S mkdir -p "$APP_DIR"
            S chown -R steffan:steffan "$APP_DIR"

            echo "==> Sincronizando o repositório"
            cd "$APP_DIR"
            if [ -d .git ]; then
              git fetch --depth=1 origin main
              git reset --hard origin/main
            else
              git clone --depth=1 "$REPO_URL" .
            fi

            echo "==> Gravando .env de produção (a partir dos GitHub Secrets)"
            umask 077
            cat > .env <<ENVEOF
            NODE_ENV=production
            PORT=3000
            HOST=0.0.0.0
            APP_BASE_URL=https://processoseletivo.terraroxa.sp.gov.br
            DOMAIN=processoseletivo.terraroxa.sp.gov.br
            COOKIE_SECURE=true
            UPLOAD_DIR=/data/uploads
            DATABASE_URL=${DATABASE_URL}
            SESSION_SECRET=${SESSION_SECRET}
            DOC_ENCRYPTION_KEY=${DOC_ENCRYPTION_KEY}
            STORAGE_DRIVER=${STORAGE_DRIVER:-local}
            WEBDAV_BASE_URL=${WEBDAV_BASE_URL:-}
            WEBDAV_USER=${WEBDAV_USER:-}
            WEBDAV_PASS=${WEBDAV_PASS:-}
            WEBDAV_ROOT=${WEBDAV_ROOT:-Publicacoes/Processos Seletivos}
            MAIL_FROM=${MAIL_FROM:-Processos Seletivos - Terra Roxa <nao-responda@terraroxa.sp.gov.br>}
            ORGAO_NOME=Prefeitura Municipal de Terra Roxa
            ORGAO_UF=SP
            DPO_CONTATO=${DPO_CONTATO:-}
            POSTGRES_NETWORK=${POSTGRES_NETWORK}
            ENVEOF

            echo "==> Build e subida dos containers (root)"
            S docker compose build
            S docker compose up -d --remove-orphans
            S docker image prune -f

            echo "==> Healthcheck"
            sleep 6
            S docker compose ps
            S docker compose exec -T app node -e "fetch('http://127.0.0.1:3000/health').then(r=>{console.log('health:',r.status);process.exit(r.ok?0:1)}).catch(e=>{console.log('health erro:',e.message);process.exit(1)})" || echo "aviso: healthcheck ainda não respondeu (o container pode estar subindo)"
