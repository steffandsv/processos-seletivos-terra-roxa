name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1) Qualidade: lint + testes (não precisa de segredos nem de banco)
  # ---------------------------------------------------------------------------
  ci:
    name: Lint + Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test

  # ---------------------------------------------------------------------------
  # 2) Deploy: SSH no VPS (porta 2222) com o usuário "steffan" autenticando por
  #    senha. Apenas os comandos que exigem root usam sudo (mkdir em /opt,
  #    docker). git e .env rodam como steffan (dono do diretório). O app sobe em
  #    container publicando na porta de host 3005. As migrations rodam no start.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy no VPS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_PORT: ${{ secrets.APP_PORT }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DOC_ENCRYPTION_KEY: ${{ secrets.DOC_ENCRYPTION_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          DPO_CONTATO: ${{ secrets.DPO_CONTATO }}
          STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
          WEBDAV_BASE_URL: ${{ secrets.WEBDAV_BASE_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
          WEBDAV_ROOT: ${{ secrets.WEBDAV_ROOT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: steffan
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          envs: REPO_URL,APP_DIR,APP_PORT,VPS_SSH_PASSWORD,DATABASE_URL,SESSION_SECRET,DOC_ENCRYPTION_KEY,MAIL_FROM,DPO_CONTATO,STORAGE_DRIVER,WEBDAV_BASE_URL,WEBDAV_USER,WEBDAV_PASS,WEBDAV_ROOT
          script: |
            set -u
            APP_DIR="${APP_DIR:-/opt/processo-seletivo}"
            # executa um comando como root usando a senha do steffan (sudo -S)
            S() { printf '%s\n' "$VPS_SSH_PASSWORD" | sudo -S -p '' "$@"; }
            fail() { echo "DEPLOY FALHOU: $1"; exit 1; }

            echo "==> Ambiente: git=$(command -v git || echo AUSENTE) docker=$(command -v docker || echo AUSENTE)"
            echo "==> APP_DIR=$APP_DIR"
            echo "==> REPO_URL=[${REPO_URL:-VAZIO}]"

            command -v git >/dev/null 2>&1 || { echo "==> instalando git"; S apt-get update -y && S apt-get install -y git; }

            echo "==> Preparando $APP_DIR (root) e cedendo posse ao steffan"
            S mkdir -p "$APP_DIR" || fail "mkdir $APP_DIR"
            S chown -R steffan:steffan "$APP_DIR" || fail "chown $APP_DIR"

            echo "==> Sincronizando o repositório"
            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" fetch --depth=1 origin main 2>&1 || fail "git fetch"
              git -C "$APP_DIR" reset --hard origin/main 2>&1 || fail "git reset"
            else
              ( cd "$APP_DIR" && find . -mindepth 1 -maxdepth 1 -exec rm -rf {} + ) 2>/dev/null || true
              git clone --depth=1 "$REPO_URL" "$APP_DIR" 2>&1 || fail "git clone (verifique REPO_URL e a saída acima)"
            fi

            echo "==> Gravando .env de produção (a partir dos GitHub Secrets)"
            umask 077
            cat > "$APP_DIR/.env" <<ENVEOF
            NODE_ENV=production
            PORT=3000
            HOST=0.0.0.0
            APP_BASE_URL=https://processoseletivo.terraroxa.sp.gov.br
            COOKIE_SECURE=true
            UPLOAD_DIR=/data/uploads
            DATABASE_URL=${DATABASE_URL}
            SESSION_SECRET=${SESSION_SECRET}
            DOC_ENCRYPTION_KEY=${DOC_ENCRYPTION_KEY}
            STORAGE_DRIVER=${STORAGE_DRIVER:-local}
            WEBDAV_BASE_URL=${WEBDAV_BASE_URL:-}
            WEBDAV_USER=${WEBDAV_USER:-}
            WEBDAV_PASS=${WEBDAV_PASS:-}
            WEBDAV_ROOT=${WEBDAV_ROOT:-Publicacoes/Processos Seletivos}
            MAIL_FROM=${MAIL_FROM:-Processos Seletivos - Terra Roxa <nao-responda@terraroxa.sp.gov.br>}
            ORGAO_NOME=Prefeitura Municipal de Terra Roxa
            ORGAO_UF=SP
            DPO_CONTATO=${DPO_CONTATO:-}
            APP_PORT=${APP_PORT:-3005}
            ENVEOF

            PORTA="${APP_PORT:-3005}"
            echo "==> Quem ocupa a porta $PORTA no host:"
            S ss -ltnp 2>/dev/null | grep ":$PORTA " || echo "    (porta $PORTA livre)"

            echo "==> Subindo containers (root)"
            cd "$APP_DIR"
            S docker compose down --remove-orphans 2>/dev/null || true
            S docker compose build 2>&1 || fail "docker compose build"
            S docker compose up -d --remove-orphans 2>&1 || fail "docker compose up (porta $PORTA ocupada? defina o secret APP_PORT com uma porta livre)"
            S docker image prune -f >/dev/null 2>&1 || true

            echo "==> Healthcheck"
            sleep 6
            S docker compose ps
            if S docker compose exec -T app node -e "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              echo "==> Deploy OK — app saudável na porta interna 3000 (publicada em 3005)"
            else
              echo "==> aviso: healthcheck ainda não respondeu (o container pode estar subindo)"
            fi
