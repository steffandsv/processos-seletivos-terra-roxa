# App em container único, publicando na porta de HOST 3005 (saída), para não
# conflitar com outros containers. O TLS e o domínio
# (processoseletivo.terraroxa.sp.gov.br) ficam a cargo do SEU proxy reverso
# já existente no VPS, que deve encaminhar para 127.0.0.1:3005.
#
# O Postgres NÃO é definido aqui: já existe e está publicado na porta 5432 do
# host. O app o alcança via "host.docker.internal" (mapeado para o gateway do
# host), então a DATABASE_URL usa host.docker.internal:5432.
services:
  app:
    build: .
    image: processos-seletivos:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      UPLOAD_DIR: /data/uploads
      HOST: 0.0.0.0
      PORT: "3000"
    volumes:
      - uploads:/data/uploads
    ports:
      # host:container — publica na 3005 do host. Para restringir ao loopback
      # (se o seu proxy alcançar 127.0.0.1), use "127.0.0.1:3005:3000".
      - "3005:3000"
    extra_hosts:
      # permite ao container alcançar serviços publicados no host (ex.: Postgres)
      - "host.docker.internal:host-gateway"

volumes:
  uploads:
