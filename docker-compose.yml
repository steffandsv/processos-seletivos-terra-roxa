# App em container único, publicando na porta de HOST 3005 (saída), para não
# conflitar com outros containers. O TLS e o domínio
# (processoseletivo.terraroxa.sp.gov.br) ficam a cargo do SEU proxy reverso
# já existente no VPS, que deve encaminhar para 127.0.0.1:3005.
#
# O Postgres NÃO é definido aqui: já existe em seu próprio container. O app o
# alcança pela rede Docker compartilhada (network externa "db").
services:
  app:
    build: .
    image: processos-seletivos:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      UPLOAD_DIR: /data/uploads
      HOST: 0.0.0.0
      PORT: "3000"
    volumes:
      - uploads:/data/uploads
    ports:
      # host:container — publica na 3005 do host. Para restringir ao loopback
      # (se o seu proxy alcançar 127.0.0.1), use "127.0.0.1:3005:3000".
      - "3005:3000"
    networks:
      - db
      - app_net

volumes:
  uploads:

networks:
  # Rede onde o container do Postgres já está conectado.
  # Ajuste via POSTGRES_NETWORK (ex.: "mabus_default", "mabus-postgres_default").
  db:
    external: true
    name: ${POSTGRES_NETWORK:-mabus_default}
  # Rede própria do app (garante egress p/ SMTP e WebDAV/Nextcloud).
  app_net:
    driver: bridge
